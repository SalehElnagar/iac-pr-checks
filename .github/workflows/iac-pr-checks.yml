name: iac-pr-checks

on:
  # Do not use a workflow-level paths filter here. These required jobs should
  # always appear, then self-skip when no Terraform or Terragrunt changes exist.
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      mode:
        description: "Target selection mode for the live demo or a manual rerun."
        required: true
        default: auto
        type: choice
        options:
          - auto
          - full
          - path
      target_path:
        description: "Optional repo-relative path when mode=path."
        required: false
        type: string
      scenario:
        description: "Optional session label shown in the step summary."
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: iac-pr-checks-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  TERRAFORM_VERSION: 1.14.7
  TERRAGRUNT_VERSION: 0.99.4
  TFLINT_VERSION: 0.61.0
  TF_IN_AUTOMATION: "true"
  TF_INPUT: "false"
  TG_NO_COLOR: "true"
  TERRAGRUNT_NON_INTERACTIVE: "true"
  NO_COLOR: "1"
  TERM: dumb

jobs:
  fmt:
    name: iac / fmt
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Install Terragrunt
        id: install_terragrunt
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/bin"
          terragrunt_asset="terragrunt_linux_amd64"
          curl -fsSLo "${RUNNER_TEMP}/${terragrunt_asset}" "https://github.com/gruntwork-io/terragrunt/releases/download/v${TERRAGRUNT_VERSION}/${terragrunt_asset}"
          curl -fsSLo "${RUNNER_TEMP}/SHA256SUMS" "https://github.com/gruntwork-io/terragrunt/releases/download/v${TERRAGRUNT_VERSION}/SHA256SUMS"
          (
            cd "${RUNNER_TEMP}"
            grep " ${terragrunt_asset}$" SHA256SUMS | sha256sum --check -
          )
          install -m 0755 "${RUNNER_TEMP}/${terragrunt_asset}" "${RUNNER_TEMP}/bin/terragrunt"
          echo "${RUNNER_TEMP}/bin" >> "${GITHUB_PATH}"

      - name: Show tool versions
        shell: bash
        run: |
          terraform version
          terragrunt --version

      - name: Run formatting checks
        id: fmt_checks
        continue-on-error: true
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'auto' }}
          TARGET_PATH: ${{ github.event_name == 'workflow_dispatch' && inputs.target_path || '' }}
          SCENARIO_LABEL: ${{ github.event_name == 'workflow_dispatch' && inputs.scenario || '' }}
          RESULT_JSON_PATH: ${{ runner.temp }}/fmt-result.json
        run: ./scripts/ci/run_iac_fmt.sh

      - name: Upload formatting report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: fmt-report
          path: ${{ runner.temp }}/fmt-result.json
          if-no-files-found: warn
          retention-days: 7

      - name: Fail job when formatting check fails
        if: ${{ steps.fmt_checks.outcome == 'failure' }}
        shell: bash
        run: exit 1

  validate:
    name: iac / validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Install Terragrunt
        id: install_terragrunt
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/bin"
          terragrunt_asset="terragrunt_linux_amd64"
          curl -fsSLo "${RUNNER_TEMP}/${terragrunt_asset}" "https://github.com/gruntwork-io/terragrunt/releases/download/v${TERRAGRUNT_VERSION}/${terragrunt_asset}"
          curl -fsSLo "${RUNNER_TEMP}/SHA256SUMS" "https://github.com/gruntwork-io/terragrunt/releases/download/v${TERRAGRUNT_VERSION}/SHA256SUMS"
          (
            cd "${RUNNER_TEMP}"
            grep " ${terragrunt_asset}$" SHA256SUMS | sha256sum --check -
          )
          install -m 0755 "${RUNNER_TEMP}/${terragrunt_asset}" "${RUNNER_TEMP}/bin/terragrunt"
          echo "${RUNNER_TEMP}/bin" >> "${GITHUB_PATH}"

      - name: Show tool versions
        shell: bash
        run: |
          terraform version
          terragrunt --version

      - name: Run validation checks
        id: validate_checks
        continue-on-error: true
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'auto' }}
          TARGET_PATH: ${{ github.event_name == 'workflow_dispatch' && inputs.target_path || '' }}
          SCENARIO_LABEL: ${{ github.event_name == 'workflow_dispatch' && inputs.scenario || '' }}
          RESULT_JSON_PATH: ${{ runner.temp }}/validate-result.json
        run: ./scripts/ci/run_iac_validate.sh
        # The validation script discovers Terraform roots automatically and
        # rewrites GitHub SSH module sources to HTTPS so public pinned tags can
        # be validated in CI without SSH credentials.

      - name: Upload validation report
        if: ${{ always() }}
        uses: actions/upload-artifact@v4
        with:
          name: validate-report
          path: ${{ runner.temp }}/validate-result.json
          if-no-files-found: warn
          retention-days: 7

      - name: Fail job when validation check fails
        if: ${{ steps.validate_checks.outcome == 'failure' }}
        shell: bash
        run: exit 1

  lint:
    name: iac / lint
    needs:
      - fmt
      - validate
    if: ${{ always() }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Install TFLint
        id: install_tflint
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/bin" "${RUNNER_TEMP}/tflint"
          tflint_asset="tflint_linux_amd64.zip"
          curl -fsSLo "${RUNNER_TEMP}/${tflint_asset}" "https://github.com/terraform-linters/tflint/releases/download/v${TFLINT_VERSION}/${tflint_asset}"
          curl -fsSLo "${RUNNER_TEMP}/checksums.txt" "https://github.com/terraform-linters/tflint/releases/download/v${TFLINT_VERSION}/checksums.txt"
          (
            cd "${RUNNER_TEMP}"
            grep " ${tflint_asset}$" checksums.txt | sha256sum --check -
          )
          unzip -q -o "${RUNNER_TEMP}/${tflint_asset}" -d "${RUNNER_TEMP}/tflint"
          install -m 0755 "${RUNNER_TEMP}/tflint/tflint" "${RUNNER_TEMP}/bin/tflint"
          echo "${RUNNER_TEMP}/bin" >> "${GITHUB_PATH}"

      - name: Show tool versions
        shell: bash
        run: |
          terraform version
          tflint --version

      - name: Run lint checks
        id: lint_checks
        if: ${{ always() }}
        continue-on-error: true
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          MODE: ${{ github.event_name == 'workflow_dispatch' && inputs.mode || 'auto' }}
          TARGET_PATH: ${{ github.event_name == 'workflow_dispatch' && inputs.target_path || '' }}
          SCENARIO_LABEL: ${{ github.event_name == 'workflow_dispatch' && inputs.scenario || '' }}
          RESULT_JSON_PATH: ${{ runner.temp }}/lint-result.json
        run: ./scripts/ci/run_iac_lint.sh

      - name: Download check reports
        if: ${{ always() && github.event_name == 'pull_request' }}
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/iac-reports
          pattern: "*-report"

      - name: Update PR check summary comment
        if: ${{ always() && github.event_name == 'pull_request' }}
        continue-on-error: true
        shell: bash
        env:
          GITHUB_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          FMT_RESULT: ${{ needs.fmt.result }}
          VALIDATE_RESULT: ${{ needs.validate.result }}
          INSTALL_TFLINT_RESULT: ${{ steps.install_tflint.outcome }}
          LINT_STEP_RESULT: ${{ steps.lint_checks.outcome }}
        run: |
          set -euo pipefail
          lint_result="success"
          if [[ "${INSTALL_TFLINT_RESULT}" != "success" || "${LINT_STEP_RESULT}" == "failure" ]]; then
            lint_result="failure"
          elif [[ "${LINT_STEP_RESULT}" == "skipped" && "${INSTALL_TFLINT_RESULT}" == "skipped" ]]; then
            lint_result="skipped"
          fi

          body_file="${RUNNER_TEMP}/iac-pr-check-summary.md"
          fmt_report="${RUNNER_TEMP}/iac-reports/fmt-report/fmt-result.json"
          validate_report="${RUNNER_TEMP}/iac-reports/validate-report/validate-result.json"
          lint_report="${RUNNER_TEMP}/lint-result.json"

          python3 scripts/ci/render_pr_comment.py \
            --fmt-report "${fmt_report}" \
            --validate-report "${validate_report}" \
            --lint-report "${lint_report}" \
            --fmt-result "${FMT_RESULT}" \
            --validate-result "${VALIDATE_RESULT}" \
            --lint-result "${lint_result}" \
            --run-url "${RUN_URL}" \
            --output "${body_file}"

          python3 scripts/ci/upsert_pr_comment.py \
            --repo "${REPOSITORY}" \
            --pr "${PR_NUMBER}" \
            --marker "<!-- iac-pr-checks-summary -->" \
            --body-file "${body_file}"

      - name: Fail job when lint check fails
        if: ${{ always() }}
        shell: bash
        env:
          INSTALL_TFLINT_RESULT: ${{ steps.install_tflint.outcome }}
          LINT_STEP_RESULT: ${{ steps.lint_checks.outcome }}
        run: |
          set -euo pipefail
          if [[ "${INSTALL_TFLINT_RESULT}" != "success" ]]; then
            echo "Lint tool installation failed." >&2
            exit 1
          fi
          if [[ "${LINT_STEP_RESULT}" != "success" ]]; then
            echo "Lint checks failed." >&2
            exit 1
          fi
